apiVersion: v1
kind: Namespace
metadata:
  name: ingress-fix-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: correct-deploy
  namespace: ingress-fix-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: correct-deploy
  template:
    metadata:
      labels:
        app: correct-deploy
    spec:
      containers:
      - name: correct-deploy
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: correct-svc
  namespace: ingress-fix-ns
spec:
  selector:
    app: correct-deploy
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: broken-ingress
  namespace: ingress-fix-ns
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wrong-svc
            port:
              number: 80
