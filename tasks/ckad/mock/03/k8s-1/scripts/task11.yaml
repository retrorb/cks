apiVersion: v1
kind: Namespace
metadata:
  name: svc-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: svc-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-app
        image: nginx:alpine
        ports:
        - containerPort: 80
