apiVersion: v1
kind: Namespace
metadata:
  name: svc-fix-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deploy
  namespace: svc-fix-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-v2
  template:
    metadata:
      labels:
        app: web-v2
    spec:
      containers:
      - name: web-deploy
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: svc-fix-ns
spec:
  selector:
    app: web-v1
  ports:
  - port: 80
    targetPort: 80
