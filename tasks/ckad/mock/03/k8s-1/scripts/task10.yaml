apiVersion: v1
kind: Namespace
metadata:
  name: canary-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: canary-ns
spec:
  replicas: 4
  selector:
    matchLabels:
      app: frontend
      track: stable
  template:
    metadata:
      labels:
        app: frontend
        track: stable
    spec:
      containers:
      - name: main-app
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: canary-ns
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
