apiVersion: v1
kind: Namespace
metadata:
  name: bg-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  namespace: bg-ns
  labels:
    app: myapp
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: blue
  template:
    metadata:
      labels:
        app: myapp
        version: blue
    spec:
      containers:
      - name: app-blue
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: bg-ns
spec:
  selector:
    version: blue
  ports:
  - port: 80
    targetPort: 80
