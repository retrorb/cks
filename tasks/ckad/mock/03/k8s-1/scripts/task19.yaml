apiVersion: v1
kind: Namespace
metadata:
  name: headless-ns
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-stateful
  namespace: headless-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db-stateful
  template:
    metadata:
      labels:
        app: db-stateful
    spec:
      containers:
      - name: db-stateful
        image: nginx:alpine
        ports:
        - containerPort: 5432
