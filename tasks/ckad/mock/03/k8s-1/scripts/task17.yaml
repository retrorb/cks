apiVersion: v1
kind: Namespace
metadata:
  name: app-ns
---
apiVersion: v1
kind: Namespace
metadata:
  name: trusted-ns
---
apiVersion: v1
kind: Namespace
metadata:
  name: untrusted-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: app-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: viktoruj/ping_pong:alpine
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: trusted-ns
spec:
  containers:
  - name: test-pod
    image: viktoruj/ping_pong:alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: untrusted-ns
spec:
  containers:
  - name: test-pod
    image: viktoruj/ping_pong:alpine
