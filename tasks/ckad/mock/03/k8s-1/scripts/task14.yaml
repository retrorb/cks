apiVersion: v1
kind: Namespace
metadata:
  name: ingress-multi-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
  namespace: ingress-multi-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-deploy
  template:
    metadata:
      labels:
        app: api-deploy
    spec:
      containers:
      - name: api-deploy
        image: viktoruj/ping_pong:alpine
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: ingress-multi-ns
spec:
  selector:
    app: api-deploy
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deploy
  namespace: ingress-multi-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-deploy
  template:
    metadata:
      labels:
        app: web-deploy
    spec:
      containers:
      - name: web-deploy
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: ingress-multi-ns
spec:
  selector:
    app: web-deploy
  ports:
  - port: 80
    targetPort: 80
