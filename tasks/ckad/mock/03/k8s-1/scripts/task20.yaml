apiVersion: v1
kind: Namespace
metadata:
  name: final-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: final-app
  namespace: final-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: final-app
  template:
    metadata:
      labels:
        app: final-app
    spec:
      containers:
      - name: final-app
        image: viktoruj/ping_pong:alpine
        ports:
        - containerPort: 8080
