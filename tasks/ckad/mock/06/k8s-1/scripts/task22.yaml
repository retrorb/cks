apiVersion: v1
kind: Namespace
metadata:
  name: vhost-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-app
  namespace: vhost-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
      - name: blog
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blog-svc
  namespace: vhost-ns
spec:
  selector:
    app: blog
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-app
  namespace: vhost-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop
  template:
    metadata:
      labels:
        app: shop
    spec:
      containers:
      - name: shop
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: shop-svc
  namespace: vhost-ns
spec:
  selector:
    app: shop
  ports:
  - port: 80
    targetPort: 80
