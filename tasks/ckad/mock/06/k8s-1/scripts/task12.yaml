apiVersion: v1
kind: Namespace
metadata:
  name: recreate-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-proc
  namespace: recreate-ns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: batch-proc
  template:
    metadata:
      labels:
        app: batch-proc
    spec:
      containers:
      - name: batch-proc
        image: nginx:1.24
        ports:
        - containerPort: 80
