apiVersion: v1
kind: Namespace
metadata:
  name: rewrite-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: rewrite-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-backend
        image: viktoruj/ping_pong:alpine
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc21
  namespace: rewrite-ns
spec:
  selector:
    app: api
  ports:
  - port: 8080
    targetPort: 8080
