# CRD for task 3
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: monitors.observability.example.com
spec:
  group: observability.example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              interval:
                type: string
              target:
                type: string
  scope: Namespaced
  names:
    plural: monitors
    singular: monitor
    kind: Monitor
    shortNames:
    - mon
---
# Task 6: netpol-deny-ns pods
apiVersion: v1
kind: Pod
metadata:
  name: server-pod
  namespace: netpol-deny-ns
  labels:
    app: server
spec:
  containers:
  - name: server
    image: nginx:alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
  namespace: netpol-deny-ns
spec:
  selector:
    app: server
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: api-client
  namespace: netpol-deny-ns
  labels:
    role: api
spec:
  containers:
  - name: client
    image: busybox
    command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: random-pod
  namespace: netpol-deny-ns
  labels:
    role: other
spec:
  containers:
  - name: client
    image: busybox
    command: ["sleep", "3600"]
---
# Task 7: worker-app deployment in hpa-behavior-ns
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-app
  namespace: hpa-behavior-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-app
  template:
    metadata:
      labels:
        app: worker-app
    spec:
      containers:
      - name: worker-app
        image: nginx:alpine
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
        ports:
        - containerPort: 80
---
# Task 8: ResourceQuota + heavy-pod in quota-ns
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: quota-ns
spec:
  hard:
    cpu: "500m"
    memory: "1Gi"
---
apiVersion: v1
kind: Pod
metadata:
  name: heavy-pod
  namespace: quota-ns
spec:
  containers:
  - name: heavy
    image: nginx:alpine
    resources:
      requests:
        cpu: "2"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
---
# Task 12: netpol-and-ns pods
apiVersion: v1
kind: Pod
metadata:
  name: db-pod
  namespace: netpol-and-ns
  labels:
    role: db
spec:
  containers:
  - name: db
    image: nginx:alpine
    ports:
    - containerPort: 5432
---
apiVersion: v1
kind: Pod
metadata:
  name: api-pod
  namespace: netpol-and-ns
  labels:
