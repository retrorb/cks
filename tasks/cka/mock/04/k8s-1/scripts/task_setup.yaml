# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: log-ns
# ============================================================
# Task 20: CRD backups.storage.example.com + backup-ns + wrong CR in default
# ============================================================
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backups.storage.example.com
spec:
  group: storage.example.com
  names:
    kind: Backup
    listKind: BackupList
    plural: backups
    singular: backup
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              target:
                type: string
---
apiVersion: v1
kind: Namespace
metadata:
  name: backup-ns
---
apiVersion: storage.example.com/v1
kind: Backup
metadata:
  name: my-backup
  namespace: default
spec:
  target: wrong-namespace
