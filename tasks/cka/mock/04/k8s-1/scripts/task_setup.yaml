# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: kustomize-ns
---
apiVersion: v1
kind: Namespace
metadata:
  name: overlay-ns
# ============================================================
# Task 15: CRD namespace
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: crd-ns
# ============================================================
# Task 17: storage-ns namespace
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: storage-ns
# ============================================================
