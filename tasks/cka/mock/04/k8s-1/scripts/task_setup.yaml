# ============================================================
# Task 1: RBAC — rbac-ns namespace + reader-sa SA
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: rbac-ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reader-sa
  namespace: rbac-ns
# ============================================================
# Task 2: RBAC — monitoring namespace + node-monitor-sa SA
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-monitor-sa
  namespace: monitoring
# ============================================================
# Task 3: Fix RBAC — fix-rbac namespace, fix-sa SA, broken-rb RoleBinding with wrong SA
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: fix-rbac
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-sa
  namespace: fix-rbac
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wrong-sa
  namespace: fix-rbac
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fix-role
  namespace: fix-rbac
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: broken-rb
  namespace: fix-rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fix-role
subjects:
- kind: ServiceAccount
  name: wrong-sa
  namespace: fix-rbac
# ============================================================
# Task 4: check-ns namespace
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: check-ns
# ============================================================
# Task 5: deploy-rbac namespace + deploy-sa SA
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: deploy-rbac
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-sa
  namespace: deploy-rbac
# ============================================================
