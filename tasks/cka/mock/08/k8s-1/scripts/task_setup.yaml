# CRD for task 2
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alerts.monitoring.example.com
spec:
  group: monitoring.example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              severity:
                type: string
              message:
                type: string
              recipient:
                type: string
  scope: Namespaced
  names:
    plural: alerts
    singular: alert
    kind: Alert
    shortNames:
    - alt
---
# Task 5: api-service deployment in hpa-adv-ns
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: hpa-adv-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: api-service
        image: nginx:alpine
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        ports:
        - containerPort: 80
---
# Task 6: egress-pod in egress-ctl-ns
apiVersion: v1
kind: Pod
metadata:
  name: egress-pod
  namespace: egress-ctl-ns
  labels:
    app: egress-pod
spec:
  containers:
  - name: egress-pod
    image: busybox
    command: ["sleep", "3600"]
---
# Task 6: backend pod in backend-ns
apiVersion: v1
kind: Pod
metadata:
  name: backend-app
  namespace: backend-ns
  labels:
    app: backend-app
spec:
  containers:
  - name: backend
    image: nginx:alpine
    ports:
    - containerPort: 8080
---
