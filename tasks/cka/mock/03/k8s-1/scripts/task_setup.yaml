# ============================================================
# Task 13: Fix Ingress — broken-ingress points to wrong-svc
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: fix-ingress-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fix-app
  namespace: fix-ingress-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fix-app
  template:
    metadata:
      labels:
        app: fix-app
    spec:
      containers:
      - name: fix-app
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fix-app-svc
  namespace: fix-ingress-ns
spec:
  selector:
    app: fix-app
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: broken-ingress
  namespace: fix-ingress-ns
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wrong-svc
            port:
              number: 80
