# ============================================================
# Task 17: API access from pod — api-access namespace + ClusterRole
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: api-access
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# ============================================================
# Task 20: Troubleshoot — server-pod has correct label, client-pod has WRONG label
# NetworkPolicy allows only role=correct-client, client-pod has role=wrong-client
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: trouble-final
---
apiVersion: v1
kind: Pod
metadata:
  name: server-pod
  namespace: trouble-final
  labels:
    app: server-pod
spec:
  containers:
  - name: server
    image: nginx:alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
  namespace: trouble-final
spec:
  selector:
    app: server-pod
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: client-pod
  namespace: trouble-final
  labels:
    role: wrong-client
spec:
  containers:
  - name: curl
    image: curlimages/curl:latest
    command: ["sleep", "3600"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client
  namespace: trouble-final
spec:
  podSelector:
    matchLabels:
      app: server-pod
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: correct-client
