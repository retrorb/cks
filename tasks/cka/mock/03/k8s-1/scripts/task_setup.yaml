# ============================================================
# Task 1: ClusterIP service — pre-create namespace + backend deployment
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: app-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:alpine
        ports:
        - containerPort: 80
# ============================================================
# Task 3: LoadBalancer service — pre-create api-pod in default
# ============================================================
---
apiVersion: v1
kind: Pod
metadata:
  name: api-pod
  namespace: default
  labels:
    app: api-pod
spec:
  containers:
  - name: api-pod
    image: viktoruj/ping_pong:alpine
    ports:
    - containerPort: 8080
# ============================================================
# Task 4: Headless service — pre-create namespace + db StatefulSet
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: data
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: data
spec:
  serviceName: "db"
  replicas: 2
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: nginx:alpine
        ports:
        - containerPort: 80
# ============================================================
# Task 5: Fix broken service — broken selector points to wrong-label
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: fix-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  namespace: fix-me
spec:
  replicas: 2
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
      - name: broken-app
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: broken-service
  namespace: fix-me
spec:
  selector:
    app: wrong-label
  ports:
  - port: 80
    targetPort: 80
# ============================================================
# Task 7: Deny-all NetworkPolicy — target namespace + client namespace
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: policy-ns
  labels:
    team: policy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  namespace: policy-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target
  template:
    metadata:
      labels:
        app: target
    spec:
      containers:
      - name: target
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: target-app
  namespace: policy-ns
spec:
  selector:
    app: target
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-ns
---
apiVersion: v1
kind: Pod
metadata:
  name: external-client
  namespace: external-ns
spec:
  containers:
  - name: curl
    image: curlimages/curl:latest
    command: ["sleep", "3600"]
