  selector:
    app: wrong-app
  ports:
  - port: 80
    targetPort: 80
# ============================================================
# Task 14: broken-ingress in ingress-fix — port 9090 instead of 80
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-fix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fix-backend
  namespace: ingress-fix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fix-backend
  template:
    metadata:
      labels:
        app: fix-backend
    spec:
      containers:
      - name: fix-backend
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fix-svc
  namespace: ingress-fix
spec:
  selector:
    app: fix-backend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: broken-ingress
  namespace: ingress-fix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: fix.k8s.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fix-svc
            port:
              number: 9090
# ============================================================
# Task 15: dns-block — NetworkPolicy blocks all egress including DNS
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: dns-block
---
apiVersion: v1
kind: Pod
metadata:
  name: no-dns-pod
  namespace: dns-block
  labels:
    app: no-dns-pod
spec:
  containers:
  - name: no-dns-pod
    image: busybox
    command: ["sleep", "3600"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-egress
  namespace: dns-block
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress: []
# ============================================================
# Task 17: config-ns — ConfigMap with wrong DB_HOST value
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: config-ns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: config-ns
data:
  DB_HOST: "wrong-host"
---
apiVersion: v1
kind: Pod
metadata:
  name: env-pod
  namespace: config-ns
spec:
  containers:
  - name: env-pod
    image: nginx:alpine
    env:
    - name: DB_HOST
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: DB_HOST
