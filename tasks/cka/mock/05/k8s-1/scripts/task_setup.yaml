# ============================================================
# Task 3: crash-app in crash-ns — command /bin/wrong causes CrashLoopBackOff
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: crash-ns
---
apiVersion: v1
kind: Pod
metadata:
  name: crash-app
  namespace: crash-ns
spec:
  containers:
  - name: crash-app
    image: nginx:alpine
    command: ["/bin/wrong"]
# ============================================================
# Task 4: bad-image-app in image-ns — broken image
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: image-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-image-app
  namespace: image-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bad-image-app
  template:
    metadata:
      labels:
        app: bad-image-app
    spec:
      containers:
      - name: bad-image-app
        image: nginx:doesnotexist999
        ports:
        - containerPort: 80
# ============================================================
# Task 5: oom-app in resource-ns — memory limit too low
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: resource-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: resource-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
      - name: oom-app
        image: nginx:alpine
        resources:
          limits:
            memory: "1Mi"
          requests:
            memory: "1Mi"
# ============================================================
# Task 6: stuck-pvc in pvc-ns — missing StorageClass
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: pvc-ns
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stuck-pvc
  namespace: pvc-ns
spec:
  storageClassName: missing-sc
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
