# ============================================================
# Task 9: log-pod in log-ns — writes logs in a loop
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: log-ns
---
apiVersion: v1
kind: Pod
metadata:
  name: log-pod
  namespace: log-ns
spec:
  containers:
  - name: log-pod
    image: busybox
    command: ["sh", "-c", "while true; do echo 'log-entry: application is running'; sleep 5; done"]
# ============================================================
# Task 10: multi-pod in multi-ns — two containers
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: multi-ns
---
apiVersion: v1
kind: Pod
metadata:
  name: multi-pod
  namespace: multi-ns
spec:
  containers:
  - name: main
    image: nginx:alpine
    ports:
    - containerPort: 80
  - name: sidecar
    image: busybox
    command: ["sh", "-c", "while true; do echo 'sidecar-log: heartbeat'; sleep 3; done"]
# ============================================================
# Task 11: restart-pod in restart-ns — crashes after few seconds
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: restart-ns
---
apiVersion: v1
kind: Pod
metadata:
  name: restart-pod
  namespace: restart-ns
spec:
  containers:
  - name: restart-pod
    image: busybox
    command: ["sh", "-c", "echo 'starting up...'; sleep 5; echo 'about to crash'; exit 1"]
# ============================================================
# Task 12: wrong-port-svc in svc-ns — targetPort 9999 instead of 8080
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: svc-ns
---
apiVersion: v1
kind: Pod
metadata:
  name: real-svc-pod
  namespace: svc-ns
  labels:
    app: real-svc
spec:
  containers:
  - name: real-svc-pod
    image: viktoruj/ping_pong:alpine
    ports:
    - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wrong-port-svc
  namespace: svc-ns
spec:
  selector:
    app: real-svc
  ports:
  - port: 80
    targetPort: 9999
# ============================================================
# Task 13: no-ep-svc in ep-ns — selector app=wrong-app
